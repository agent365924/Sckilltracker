<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔ Organic PVP Log</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fafafa;
            color: #18181b;
            font-size: 14px;
            line-height: 1.5;
        }
        .container { min-height: 100vh; padding: 1.5rem 10%; }
        .content { padding-top: 3rem; }
        .header { margin-bottom: 2rem; }
        .title {
            font-size: 56px;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .subtitle { font-size: 14px; color: #71717a; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid #e4e4e7;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .stat-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .stat-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stat-icon.green { background-color: rgba(16, 185, 129, 0.1); }
        .stat-icon.red { background-color: rgba(239, 68, 68, 0.1); }
        .stat-icon.blue { background-color: rgba(59, 130, 246, 0.1); }
        .stat-label { font-size: 14px; color: #71717a; }
        .stat-value {
            font-size: 56px;
            line-height: 1.1;
            font-weight: 500;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .btn-secondary { background: #e4e4e7; color: #18181b; }
        .btn-secondary:hover { background: #d4d4d8; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .table-container {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e4e4e7;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .table-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead {
            background: #fafafa;
            border-bottom: 1px solid #e4e4e7;
        }
        th {
            padding: 1rem;
            text-align: left;
            font-size: 14px;
            color: #71717a;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }
        th:hover { background: #f4f4f5; }
        th .header-content {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        th.no-sort { cursor: default; }
        th.no-sort:hover { background: #fafafa; }
        td {
            padding: 1rem;
            font-size: 14px;
            border-bottom: 1px solid #f4f4f5;
        }
        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: #fafafa; }
        tbody tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 14px;
            width: 5rem;
            justify-content: center;
        }
        .badge-kill { background: #d1fae5; color: #047857; }
        .badge-death { background: #fee2e2; color: #b91c1c; }
        .badge-neutral { background: #e2e8f0; color: #475569; }
        .badge-type {
            background: #f4f4f5;
            color: #3f3f46;
            border-radius: 0.25rem;
            padding: 0.25rem 0.5rem;
        }
        .name-cell { font-weight: 700; }
        .delete-btn {
            opacity: 0;
            color: #dc2626;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.25rem;
            transition: all 0.2s;
        }
        tr:hover .delete-btn { opacity: 1; }
        .delete-btn:hover {
            background: #fee2e2;
            color: #b91c1c;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 50;
            padding: 1.5rem;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #e4e4e7;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 48rem;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .modal-title { font-size: 28px; line-height: 1.1; }
        .close-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .close-btn:hover { background: #f4f4f5; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: span 2; }
        label {
            font-size: 14px;
            color: #71717a;
            margin-bottom: 0.75rem;
        }
        input, select, textarea {
            background: #fafafa;
            border: 1px solid #e4e4e7;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        textarea { resize: none; font-family: inherit; }
        .form-actions {
            display: flex;
            gap: 0.75rem;
            padding-top: 1rem;
        }
        .form-actions button {
            flex: 1;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancel { background: #f4f4f5; color: #18181b; }
        .btn-cancel:hover { background: #e4e4e7; }
        .btn-submit { background: #2563eb; color: white; }
        .btn-submit:hover { background: #1d4ed8; }
        .total-entries {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
            color: #a1a1aa;
        }
        .icon { width: 1.25rem; height: 1.25rem; }
        .icon-sm { width: 0.75rem; height: 0.75rem; }
        .w-96 { width: 24rem; }
        .w-24 { width: 6rem; }
        .w-20 { width: 5rem; }
        .w-12 { width: 3rem; }
        .truncate {
            max-width: 20rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sort-icon { opacity: 0; transition: opacity 0.2s; }
        th:hover .sort-icon { opacity: 0.5; }
        .sort-icon.active { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="header">
                <h1 class="title">⚔ Organic PVP Log</h1>
                <p class="subtitle">Combat statistics and engagement history</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon green">⚔️</div>
                        <span class="stat-label">Kills</span>
                    </div>
                    <div class="stat-value" id="total-kills">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon red">💀</div>
                        <span class="stat-label">Deaths</span>
                    </div>
                    <div class="stat-value" id="total-deaths">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon blue">📊</div>
                        <span class="stat-label">K/D Ratio</span>
                    </div>
                    <div class="stat-value" id="kd-ratio">0.00</div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-secondary" onclick="saveData()">  Save  </button>
                <button class="btn btn-secondary" onclick="loadData()">  Load  <input type="file" accept=".json" onchange="loadData(event)" style="display: none;"> </button>
                <button class="btn btn-primary" onclick="openModal()">  Add Entry  </button>
            </div>

            <div class="table-container">
                <div class="table-scroll">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th class="no-sort w-12"></th>
                                <th onclick="sortTable('dateTime')">
                                    <div class="header-content">
                                        Date/Time
                                        <span class="sort-icon" id="sort-dateTime">⇅</span>
                                    </div>
                                </th>
                                <th onclick="sortTable('status')" class="w-24">
                                    <div class="header-content">
                                        Result
                                        <span class="sort-icon" id="sort-status">⇅</span>
                                    </div>
                                </th>
                                <th onclick="sortTable('name')">
                                    <div class="header-content">
                                        Name
                                        <span class="sort-icon" id="sort-name">⇅</span>
                                    </div>
                                </th>
                                <th onclick="sortTable('opposingShip')">
                                    <div class="header-content">
                                        Ship
                                        <span class="sort-icon" id="sort-opposingShip">⇅</span>
                                    </div>
                                </th>
                                <th onclick="sortTable('type')" class="w-20">
                                    <div class="header-content">
                                        Type
                                        <span class="sort-icon" id="sort-type">⇅</span>
                                    </div>
                                </th>
                                <th onclick="sortTable('weaponShip')" class="w-96">
                                    <div class="header-content">
                                        Weapon
                                        <span class="sort-icon" id="sort-weaponShip">⇅</span>
                                    </div>
                                </th>
                                <th onclick="sortTable('location')">
                                    <div class="header-content">
                                        Location
                                        <span class="sort-icon" id="sort-location">⇅</span>
                                    </div>
                                </th>
                                <th class="no-sort">Details</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="total-entries">Total Entries: <span id="total-entries">0</span></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">New Entry</h3>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <form id="entry-form" onsubmit="handleSubmit(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Date/Time</label>
                        <input type="text" id="dateTime" placeholder="DD.MM.YYYY HHMM" required>
                    </div>
                    <div class="form-group">
                        <label>Result</label>
                        <select id="status">
                            <option value="kill">Kill</option>
                            <option value="death">Death</option>
                            <option value="neutral">Neutral</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Opponent Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Opposing Ship</label>
                        <input type="text" id="opposingShip" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="type">
                            <option value="s2s">s2s (Ship to Ship)</option>
                            <option value="fps">fps (First Person)</option>
                            <option value="s2g">s2g (Ship to Ground)</option>
                            <option value="s2e">s2e (Ship to EVA)</option>
                            <option value="g2s">g2s (Ground to Ship)</option>
                            <option value="eva">eva (FPS in Space)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Weapon/Ship</label>
                        <input type="text" id="weaponShip">
                    </div>
                    <div class="form-group full">
                        <label>Location</label>
                        <input type="text" id="location" required>
                    </div>
                    <div class="form-group full">
                        <label>Details</label>
                        <textarea id="details" rows="4"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-submit">Save Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script src="pvpData.js"></script>
    <script>
        let sortColumn = null;
        let sortDirection = 'asc';

        function updateStats() {
            const kills = entries.filter(e => e.status === 'kill').length;
            const deaths = entries.filter(e => e.status === 'death').length;
            const kdRatio = deaths === 0 ? kills.toFixed(2) : (kills / deaths).toFixed(2);
            document.getElementById('total-kills').textContent = kills;
            document.getElementById('total-deaths').textContent = deaths;
            document.getElementById('kd-ratio').textContent = kdRatio;
            document.getElementById('total-entries').textContent = entries.length;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const sortedEntries = getSortedEntries();
            tbody.innerHTML = sortedEntries.map(entry => `
                <tr>
                    <td class="w-12">
                        <button class="delete-btn" onclick="deleteEntry('${entry.id}')" title="Delete">🗑️</button>
                    </td>
                    <td>${entry.dateTime}</td>
                    <td class="w-24">
                        <span class="badge badge-${entry.status}">
                            ${entry.status === 'kill' ? '⚔ Kill' : entry.status === 'death' ? '💀 Death' : '— Neutral'}
                        </span>
                    </td>
                    <td class="name-cell">${entry.name}</td>
                    <td>${entry.opposingShip}</td>
                    <td class="w-20"><span class="badge-type">${entry.type}</span></td>
                    <td class="w-96">${entry.weaponShip}</td>
                    <td>${entry.location}</td>
                    <td class="truncate">${entry.details}</td>
                </tr>
            `).join('');
            updateStats();
        }

        function parseDateTime(dateTimeStr) {
            const parts = dateTimeStr.trim().split(' ');
            const dateParts = parts[0].split('.');
            const timePart = parts[1] || '0000';
            const day = parseInt(dateParts[0]) || 1;
            const month = parseInt(dateParts[1]) || 1;
            const year = parseInt(dateParts[2]) || 2000;
            const hour = parseInt(timePart.substring(0, 2)) || 0;
            const minute = parseInt(timePart.substring(2, 4)) || 0;
            return new Date(year, month - 1, day, hour, minute);
        }

        function getSortedEntries() {
            if (!sortColumn) return entries;
            return [...entries].sort((a, b) => {
                let aValue = a[sortColumn];
                let bValue = b[sortColumn];
                if (sortColumn === 'dateTime') {
                    const aDate = parseDateTime(aValue);
                    const bDate = parseDateTime(bValue);
                    return sortDirection === 'asc' ? aDate - bDate : bDate - aDate;
                }
                if (typeof aValue === 'string') aValue = aValue.toLowerCase();
                if (typeof bValue === 'string') bValue = bValue.toLowerCase();
                if (aValue < bValue) return sortDirection === 'asc' ? -1 : 1;
                if (aValue > bValue) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function sortTable(column) {
            document.querySelectorAll('.sort-icon').forEach(icon => icon.classList.remove('active'));
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            const sortIcon = document.getElementById(`sort-${column}`);
            if (sortIcon) {
                sortIcon.classList.add('active');
                sortIcon.textContent = sortDirection === 'asc' ? '↑' : '↓';
            }
            renderTable();
        }

        function openModal() { document.getElementById('modal').classList.add('active'); }
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('entry-form').reset();
        }

        function handleSubmit(event) {
            event.preventDefault();
            const newEntry = {
                id: Date.now().toString(),
                dateTime: document.getElementById('dateTime').value,
                status: document.getElementById('status').value,
                name: document.getElementById('name').value,
                opposingShip: document.getElementById('opposingShip').value,
                type: document.getElementById('type').value,
                weaponShip: document.getElementById('weaponShip').value,
                location: document.getElementById('location').value,
                details: document.getElementById('details').value
            };
            entries.unshift(newEntry);
            renderTable();
            closeModal();
        }

        function deleteEntry(id) {
            entries = entries.filter(entry => entry.id !== id);
            renderTable();
        }

        function saveData() {
            const dataStr = JSON.stringify(entries, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'pvp-log.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        function loadData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    entries = JSON.parse(e.target.result);
                    renderTable();
                } catch (error) {
                    alert('Error loading file. Please ensure it is a valid JSON file.');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });

        renderTable();
    </script>
</body>
</html>
